<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Crowded Sky</title>
  <meta name="description" content="Real-time 3D visualization of 27,000+ tracked objects in Earth orbit — satellites, debris, and rocket bodies." />
  <meta property="og:title" content="Crowded Sky" />
  <meta property="og:description" content="Real-time 3D visualization of Earth's orbital debris field" />
  <meta property="og:image" content="https://marginallyharmless.github.io/OrbitalDebris/og-image.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Crowded Sky" />
  <meta name="twitter:description" content="Real-time 3D visualization of Earth's orbital debris field" />
  <meta name="twitter:image" content="https://marginallyharmless.github.io/OrbitalDebris/og-image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      box-sizing: border-box;
    }

    html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000000;
      font-family: 'Space Grotesk', sans-serif;
      color: rgba(255, 255, 255, 0.7);
      position: relative;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      touch-action: none;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-card {
      background: rgba(10, 12, 20, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 32px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #loading-screen .title {
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.6);
    }

    .progress-container {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 1px;
      overflow: hidden;
    }

    #progress-bar {
      height: 2px;
      width: 0%;
      background: #00e5ff;
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    #loading-status {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.35);
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
    }

    #selection-panel {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      box-sizing: border-box;
      pointer-events: auto;
      background: rgba(10, 12, 20, 0.85);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 18px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.7);
      display: none;
      border-radius: 10px;
      overflow-y: auto;
      max-width: 280px;
      min-width: 200px;
      max-height: 50vh;
    }

    @media (max-width: 767px) {
      #selection-panel {
        left: 12px;
        right: 12px;
        bottom: 12px;
        top: auto;
        max-width: none;
        min-width: 0;
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="loading-screen">
    <div class="loading-card">
      <div class="title">Acquiring Catalog</div>
      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>
      <div id="loading-status"></div>
    </div>
  </div>

  <div id="hud"></div>
  <div id="selection-panel"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
